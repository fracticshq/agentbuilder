[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-runtime"
version = "0.1.0"
description = "SOTA Orchestrator Runtime for Agent Builder"
authors = [
    {name = "Agent Builder Team", email = "team@agentbuilder.ai"}
]
readme = "README.md"
requires-python = ">=3.10"

[project.optional-dependencies]
dev = ["pytest", "black", "isort", "mypy"]
