[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-retrieval"
version = "0.1.0"
description = "Hybrid retrieval pipeline with vector search, BM25, RRF fusion, and reranking"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "motor>=3.3.0",
    "httpx>=0.25.0",
    "structlog>=23.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
retrieval = ["py.typed"]
