[project]
name = "llm"
version = "0.0.0"
description = "LLM adapters for Agent Builder Platform"
requires-python = ">=3.10"
dependencies = [
    "openai>=2.0.0",
    "httpx>=0.28.0",
    "pydantic>=2.12.0",
    "structlog>=25.4.0",
    "python-dotenv>=1.1.0",
    "tenacity>=9.0.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
llm = ["py.typed"]
