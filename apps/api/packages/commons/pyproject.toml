[project]
name = "commons"
version = "0.0.0"
description = "Common utilities for Agent Builder Platform"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.12.0",
    "structlog>=25.4.0",
    "python-dotenv>=1.1.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
commons = ["py.typed"]
