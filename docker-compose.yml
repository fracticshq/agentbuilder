services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .                        # repo root — needs access to packages/
      dockerfile: apps/api/Dockerfile
    image: agentbuilder-api
    container_name: agentbuilder-api
    ports:
      - "8000:8000"
    env_file:
      - .env                            # your secrets — never baked into the image
    environment:
      # Override DB URLs to use Docker service names instead of localhost
      MONGODB_URI: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      SHOPIFY_MCP_URL: "http://shopify:3005/mcp"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      shopify:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React Admin Dashboard ────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8000
    image: agentbuilder-admin
    container_name: agentbuilder-admin
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # ── Chat Widget ──────────────────────────────────────────────────────────────
  widget:
    build:
      context: .
      dockerfile: apps/widget/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    image: agentbuilder-widget
    container_name: agentbuilder-widget
    ports:
      - "5174:5174"
    depends_on:
      - api
    restart: unless-stopped

  # ── Shopify MCP ──────────────────────────────────────────────────────────────
  shopify:
    build:
      context: ./apps/shopify-mcp
      dockerfile: Dockerfile
    image: agentbuilder-shopify
    container_name: agentbuilder-shopify
    ports:
      - "3005:3005"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: agentbuilder-mongodb
    ports:
      - "27017:27017"                   # expose so you can connect with Compass
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentbuilder-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
