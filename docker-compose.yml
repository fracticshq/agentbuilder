services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .                        # repo root — needs access to packages/
      dockerfile: apps/api/Dockerfile
    image: agentbuilder-api
    container_name: agentbuilder-api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker                     # secrets — never baked into the image
    environment:
      # Only Docker-internal service URLs that differ from .env.docker defaults
      SHOPIFY_MCP_URL: "http://shopify:3005/mcp"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      DEBUG: "${DEBUG:-false}"
      REQUIRE_MONGODB: "${REQUIRE_MONGODB:-true}"
      REQUIRE_REDIS: "${REQUIRE_REDIS:-false}"
      ENABLE_HUMAN_TAKEOVER: "${ENABLE_HUMAN_TAKEOVER:-true}"
      ALLOW_ADMIN_KEY_BYPASS: "${ALLOW_ADMIN_KEY_BYPASS:-false}"
      STRAPI_URL: "${DOCKER_STRAPI_URL:-http://host.docker.internal:1337}"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      shopify:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React Admin Dashboard ────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    image: agentbuilder-admin
    container_name: agentbuilder-admin
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: "${ADMIN_API_BASE_URL:-http://localhost:8000}"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Chat Widget ──────────────────────────────────────────────────────────────
  widget:
    build:
      context: .
      dockerfile: apps/widget/Dockerfile
    image: agentbuilder-widget
    container_name: agentbuilder-widget
    ports:
      - "5174:5174"
    environment:
      API_BASE_URL: "${WIDGET_API_BASE_URL:-http://localhost:8000}"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5174/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Shopify MCP ──────────────────────────────────────────────────────────────
  shopify:
    build:
      context: ./apps/shopify-mcp
      dockerfile: Dockerfile
    image: agentbuilder-shopify
    container_name: agentbuilder-shopify
    ports:
      - "3005:3005"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: agentbuilder-mongodb
    # Port not exposed to host in production. To connect with Compass locally,
    # temporarily add: ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentbuilder-redis
    # Port not exposed to host in production. To inspect locally,
    # temporarily add: ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
