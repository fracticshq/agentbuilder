[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tools"
version = "0.1.0"
description = "Agentic Tooling Layer (SOTA 2026)"
authors = [
    {name = "Agent Builder Team", email = "team@agentbuilder.ai"}
]
readme = "README.md"
requires-python = ">=3.11"

[project.optional-dependencies]
dev = ["pytest", "black", "isort", "mypy"]
