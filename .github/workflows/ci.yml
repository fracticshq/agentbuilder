name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      USE_AZURE_KEYVAULT: "false"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -q

  widget:
    name: Widget tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/widget
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/widget/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  admin:
    name: Admin build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npm run build

  shopify-mcp:
    name: Shopify MCP tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shopify-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/shopify-mcp/package-lock.json
      - run: npm ci
      - run: npm test

  images:
    name: Container build parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/api/Dockerfile -t agentbuilder-api:ci .
      - run: docker build -t agentbuilder-shopify:ci apps/shopify-mcp
      - run: cp .env.docker.example .env.docker && docker compose config --no-interpolate >/dev/null
