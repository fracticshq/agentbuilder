name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      USE_AZURE_KEYVAULT: "false"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.lock
      - run: python ../../scripts/verify_canonical_packages.py --root ../..
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: >-
          python -m pip install --no-deps --no-build-isolation
          ../../packages/commons
          ../../packages/llm
          ../../packages/memory
          ../../packages/retrieval
          ../../packages/tools
          ../../packages/agent_runtime
      - run: python -m pip check
      - run: python -m pytest -q
      - run: python ../../evals/run_safety_contracts.py
      - run: python ../../evals/run_hybrid_rag_golden.py
      - run: python ../../scripts/generate_openapi.py --check
      - run: python ../../scripts/generate_postman_collection.py --check

  widget:
    name: Widget tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/widget
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/widget/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  admin:
    name: Admin tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  shopify-mcp:
    name: Shopify MCP tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shopify-mcp
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/shopify-mcp/package-lock.json
      - run: npm ci
      - run: npm test

  supply-chain-evidence:
    name: SBOM and immutable build inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python scripts/generate_sbom.py --output /tmp/agentbuilder.sbom.cdx.json
      - run: python scripts/verify_supply_chain.py --sbom /tmp/agentbuilder.sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agentbuilder-sbom-${{ github.sha }}
          path: /tmp/agentbuilder.sbom.cdx.json
          if-no-files-found: error
          retention-days: 90

  dependency-vulnerabilities:
    name: Dependency vulnerabilities (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: API Python dependencies
            manifest: apps/api/requirements.lock
          - component: Agent runtime Python package
            manifest: packages/agent_runtime/pyproject.toml
          - component: Commons Python package
            manifest: packages/commons/pyproject.toml
          - component: LLM Python package
            manifest: packages/llm/pyproject.toml
          - component: Memory Python package
            manifest: packages/memory/pyproject.toml
          - component: Retrieval Python package
            manifest: packages/retrieval/pyproject.toml
          - component: Tools Python package
            manifest: packages/tools/pyproject.toml
          - component: Admin Node lockfile
            manifest: apps/admin/package-lock.json
          - component: Widget Node lockfile
            manifest: apps/widget/package-lock.json
          - component: Shopify MCP Node lockfile
            manifest: apps/shopify-mcp/package-lock.json
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Fail on high or critical dependency vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.manifest }}
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Fail on SAST findings
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/src:ro" \
            -w /src \
            semgrep/semgrep:1.91.0@sha256:b71f57a5f546b27dfd5e5fb62149e5fa4cf0ce58436a8fcb4e3723fe972788e8 \
            semgrep scan \
            --config p/default \
            --error \
            --strict \
            --disable-nosem \
            --metrics=off \
            --exclude '**/*.test.*' \
            --exclude '**/*.spec.*' \
            apps/api/app \
            packages \
            apps/admin/src \
            apps/widget/src \
            apps/shopify-mcp/src \
            apps/api/Dockerfile \
            apps/admin/Dockerfile \
            apps/widget/Dockerfile \
            apps/shopify-mcp/Dockerfile \
            docker-compose.yml

  images:
    name: Container build parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: docker build -f apps/api/Dockerfile -t agentbuilder-api:ci .
      - run: docker build -t agentbuilder-admin:ci apps/admin
      - run: docker build -t agentbuilder-widget:ci apps/widget
      - run: docker build -t agentbuilder-shopify:ci apps/shopify-mcp
      - run: cp .env.docker.example .env.docker && docker compose config --no-interpolate >/dev/null
